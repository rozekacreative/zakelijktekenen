<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zakelijk Tekenen Oefenen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --accent: #e8541a;
    --soft: #c8b89a;
    --light: #ede8dd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 { font-family: 'Caveat', cursive; font-size: 1.4rem; }

  .mode-tabs { display: flex; gap: 5px; }

  .tab-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── OPDRACHT BANNER ── */
  #opdracht-banner {
    background: var(--light);
    border-bottom: 2.5px solid var(--soft);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    min-height: 64px;
  }
  #opdracht-label {
    font-size: 0.6rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--accent); white-space: nowrap;
  }
  #opdracht-tekst {
    font-family: 'Caveat', cursive;
    font-size: 1.7rem; font-weight: 700;
    color: var(--ink); flex: 1; line-height: 1.2;
  }
