<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zakelijk Tekenen Oefenen</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --ink: #1a1a2e;
    --paper: #f5f0e8;
    --accent: #e8541a;
    --soft: #c8b89a;
    --light: #ede8dd;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  header h1 { font-family: 'Caveat', cursive; font-size: 1.4rem; }

  .mode-tabs { display: flex; gap: 5px; }

  .tab-btn {
    background: transparent;
    border: 1.5px solid rgba(255,255,255,0.3);
    color: rgba(255,255,255,0.7);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ── OPDRACHT BANNER ── */
  #opdracht-banner {
    background: var(--light);
    border-bottom: 2.5px solid var(--soft);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    min-height: 64px;
  }
  #opdracht-label {
    font-size: 0.6rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--accent); white-space: nowrap;
  }
  #opdracht-tekst {
    font-family: 'Caveat', cursive;
    font-size: 1.7rem; font-weight: 700;
    color: var(--ink); flex: 1; line-height: 1.2;
  }
  .nav-btn {
    background: var(--ink); color: var(--paper);
    border: none; padding: 7px 13px;
    border-radius: 20px; font-size: 0.7rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }

  /* ── HINT PANEL (opdracht modus) ── */
  #voorbeeld-panel {
    background: white;
    border-bottom: 2px solid var(--soft);
    padding: 8px 16px;
    display: none; flex-shrink: 0;
  }
  #voorbeeld-panel.zichtbaar { display: block; }
  #voorbeeld-panel p {
    font-size: 0.65rem; color: var(--soft);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;
  }
  #voorbeeld-svg { width: 100%; max-height: 95px; display: block; }

  /* ── CANVAS (opdracht + vrij) ── */
  #canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: white;
    background-image:
      linear-gradient(rgba(180,170,150,0.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,170,150,0.13) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  #tekencanvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; cursor: crosshair;
  }

  /* ── NATEKENEN MODUS ── */
  #natekenen-wrap {
    display: none; flex: 1; overflow: hidden;
  }
  #natekenen-wrap.actief { display: flex; flex-direction: column; }

  #natekenen-banner {
    background: var(--light);
    border-bottom: 2.5px solid var(--soft);
    padding: 10px 16px;
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  #natekenen-label {
    font-size: 0.6rem; font-weight: 500;
    text-transform: uppercase; letter-spacing: 1.2px;
    color: var(--accent); white-space: nowrap;
  }
  #natekenen-naam {
    font-family: 'Caveat', cursive;
    font-size: 1.4rem; font-weight: 700;
    color: var(--ink); flex: 1;
  }

  #natekenen-inhoud {
    flex: 1; display: flex; overflow: hidden;
  }

  /* Landscape: naast elkaar */
  #natekenen-voorbeeld {
    width: 50%; flex-shrink: 0;
    background: var(--light);
    display: flex; align-items: center; justify-content: center;
    border-right: 2px solid var(--soft);
    padding: 8px; overflow: hidden;
  }
  #natekenen-voorbeeld img {
    max-width: 100%; max-height: 100%;
    object-fit: contain; border-radius: 6px;
  }
  .natekenen-placeholder {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px; opacity: 0.5;
  }
  .natekenen-placeholder span { font-size: 2.5rem; }
  .natekenen-placeholder small {
    font-size: 0.7rem; font-family: 'DM Sans', sans-serif;
    color: var(--soft); text-align: center;
  }

  #natekenen-canvas-wrap {
    flex: 1; position: relative; overflow: hidden;
    background: white;
    background-image:
      linear-gradient(rgba(180,170,150,0.13) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,170,150,0.13) 1px, transparent 1px);
    background-size: 30px 30px;
  }
  #natekenen-canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%; cursor: crosshair;
  }

  /* Portrait: boven / onder */
  @media (max-aspect-ratio: 1/1) {
    #natekenen-inhoud { flex-direction: column; }
    #natekenen-voorbeeld {
      width: 100%; height: 42%;
      border-right: none; border-bottom: 2px solid var(--soft);
    }
  }

  /* ── TOOLBAR ── */
  #toolbar {
    background: var(--ink); padding: 9px 12px;
    display: flex; align-items: center;
    gap: 7px; overflow-x: auto; flex-shrink: 0;
  }
  .tool-group { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
  .divider { width: 1px; height: 28px; background: rgba(255,255,255,0.18); flex-shrink: 0; }

  .tool-btn {
    width: 36px; height: 36px; border-radius: 8px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: transparent; color: white; font-size: 1.05rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .tool-btn.active { background: var(--accent); border-color: var(--accent); }
  .tool-btn:active { transform: scale(0.92); }

  .size-btn {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    background: transparent; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; flex-shrink: 0;
  }
  .size-btn.active { border-color: var(--accent); background: rgba(232,84,26,0.2); }
  .size-dot { background: white; border-radius: 50%; }

  .color-swatch {
    width: 26px; height: 26px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.2);
    cursor: pointer; transition: transform 0.15s; flex-shrink: 0;
  }
  .color-swatch.active { border-color: white; transform: scale(1.15); }

  #wis-btn {
    background: rgba(255,255,255,0.08);
    border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.8); padding: 6px 10px;
    border-radius: 8px; font-size: 0.68rem;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; white-space: nowrap; flex-shrink: 0;
  }
</style>
</head>
<body>

<header>
  <h1>✏️ Zakelijk Tekenen</h1>
  <div class="mode-tabs">
    <button class="tab-btn active" onclick="setMode('opdracht', this)">Opdracht</button>
    <button class="tab-btn" onclick="setMode('vrij', this)">Vrij</button>
    <button class="tab-btn" onclick="setMode('natekenen', this)">Natekenen</button>
  </div>
</header>

<!-- OPDRACHT BANNER -->
<div id="opdracht-banner">
  <span id="opdracht-label">Teken nu:</span>
  <span id="opdracht-tekst">Idee</span>
  <button class="nav-btn" onclick="volgendOpdracht()">Volgende →</button>
</div>

<!-- HINT PANEL -->
<div id="voorbeeld-panel">
  <p>Voorbeeld</p>
  <svg id="voorbeeld-svg" viewBox="0 0 300 90" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<!-- CANVAS (opdracht + vrij) -->
<div id="canvas-wrap">
  <canvas id="tekencanvas"></canvas>
</div>

<!-- NATEKENEN -->
<div id="natekenen-wrap">
  <div id="natekenen-banner">
    <span id="natekenen-label">Natekenen:</span>
    <span id="natekenen-naam">—</span>
    <button class="nav-btn" onclick="volgendNatekenen()">Volgende →</button>
  </div>
  <div id="natekenen-inhoud">
    <div id="natekenen-voorbeeld">
      <div class="natekenen-placeholder" id="natekenen-placeholder">
        <span>🖼️</span>
        <small>Voeg afbeeldingen toe<br>met naam voorbeeld-01.jpg etc.</small>
      </div>
      <img id="natekenen-img" src="" alt="" style="display:none">
    </div>
    <div id="natekenen-canvas-wrap">
      <canvas id="natekenen-canvas"></canvas>
    </div>
  </div>
</div>

<!-- TOOLBAR -->
<div id="toolbar">
  <div class="tool-group">
    <button class="tool-btn active" id="stift-btn" onclick="setTool('stift')" title="Stift">
      <!-- Stift SVG icoon -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/>
      </svg>
    </button>
    <button class="tool-btn" id="gum-btn" onclick="setTool('gum')" title="Gum">🧹</button>
  </div>
  <div class="divider"></div>
  <div class="tool-group">
    <button class="size-btn active" id="s-klein" onclick="setSize(3, 's-klein')">
      <div class="size-dot" style="width:5px;height:5px"></div>
    </button>
    <button class="size-btn" id="s-midden" onclick="setSize(6, 's-midden')">
      <div class="size-dot" style="width:9px;height:9px"></div>
    </button>
    <button class="size-btn" id="s-groot" onclick="setSize(13, 's-groot')">
      <div class="size-dot" style="width:14px;height:14px"></div>
    </button>
  </div>
  <div class="divider"></div>
  <div class="tool-group">
    <div class="color-swatch active" style="background:#1a1a2e" onclick="setKleur('#1a1a2e', this)"></div>
    <div class="color-swatch" style="background:#e8541a" onclick="setKleur('#e8541a', this)"></div>
    <div class="color-swatch" style="background:#2d6a4f" onclick="setKleur('#2d6a4f', this)"></div>
    <div class="color-swatch" style="background:#1d4e89" onclick="setKleur('#1d4e89', this)"></div>
    <div class="color-swatch" style="background:#b5b5b5" onclick="setKleur('#b5b5b5', this)"></div>
  </div>
  <div class="divider"></div>
  <button id="wis-btn" onclick="wisActiefCanvas()">🗑 Wis</button>
  <button class="tool-btn" onclick="toggleVoorbeeld()" title="Hint" id="hint-btn" style="margin-left:auto">👁</button>
</div>

<script>

// ── Random shuffle hulpfunctie ──────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Opdrachten (random) ─────────────────────────────────────
let opdrachtWachtrij = shuffle(opdrachten);
let opdrachtIndex = 0;
let voorbeeldZichtbaar = false;

function huidigOpdracht() { return opdrachtWachtrij[opdrachtIndex]; }

function volgendOpdracht() {
  opdrachtIndex = (opdrachtIndex + 1) % opdrachtWachtrij.length;
  if (opdrachtIndex === 0) opdrachtWachtrij = shuffle(opdrachten);
  toonOpdracht();
  wisActiefCanvas();
  if (voorbeeldZichtbaar) toonHint();
}

function toonOpdracht() {
  document.getElementById('opdracht-tekst').textContent = huidigOpdracht().woord;
}

function toggleVoorbeeld() {
  voorbeeldZichtbaar = !voorbeeldZichtbaar;
  document.getElementById('voorbeeld-panel').classList.toggle('zichtbaar', voorbeeldZichtbaar);
  if (voorbeeldZichtbaar) toonHint();
}

function toonHint() {
  const o = huidigOpdracht();
  const svg = document.getElementById('voorbeeld-svg');
  svg.innerHTML = o.svg ? o.svg() : `<text x="10" y="50" font-family="Caveat" font-size="16" fill="#b5b5b5">Geen hint beschikbaar voor "${o.woord}"</text>`;
}

let natekeenWachtrij = shuffle(natekeenAfbeeldingen);
let natekeenIndex = 0;

function huidigNatekeen() { return natekeenWachtrij[natekeenIndex]; }

function volgendNatekenen() {
  natekeenIndex = (natekeenIndex + 1) % natekeenWachtrij.length;
  if (natekeenIndex === 0) natekeenWachtrij = shuffle(natekeenAfbeeldingen);
  toonNatekeen();
  wisNatekeenCanvas();
}

function toonNatekeen() {
  const v = huidigNatekeen();
  document.getElementById('natekenen-naam').textContent = v.label;
  const img = document.getElementById('natekenen-img');
  const placeholder = document.getElementById('natekenen-placeholder');
  img.style.display = 'none';
  if (placeholder) placeholder.style.display = 'flex';

  const test = new Image();
  test.onload = () => {
    img.src = v.bestand;
    img.style.display = 'block';
    if (placeholder) placeholder.style.display = 'none';
  };
  test.onerror = () => {
    img.style.display = 'none';
    if (placeholder) placeholder.style.display = 'flex';
  };
  test.src = v.bestand;
}

// ── Canvas: opdracht + vrij ─────────────────────────────────
const canvas = document.getElementById('tekencanvas');
const ctx = canvas.getContext('2d');

// ── Canvas: natekenen ───────────────────────────────────────
const nCanvas = document.getElementById('natekenen-canvas');
const nCtx = nCanvas.getContext('2d');

let huidigeModus = 'opdracht'; // 'opdracht' | 'vrij' | 'natekenen'
let tekening = false;
let tool = 'stift';
let penGrootte = 3;
let penKleur = '#1a1a2e';
let laatste = { x: 0, y: 0 };

function actieveCtx() { return huidigeModus === 'natekenen' ? nCtx : ctx; }
function actieveCanvas() { return huidigeModus === 'natekenen' ? nCanvas : canvas; }

function resizeCanvas() {
  // Hoofd canvas
  const wrap = document.getElementById('canvas-wrap');
  const snapH = canvas.toDataURL();
  canvas.width = wrap.clientWidth || 1;
  canvas.height = wrap.clientHeight || 1;
  if (snapH !== 'data:,') { const i = new Image(); i.onload = () => ctx.drawImage(i, 0, 0); i.src = snapH; }

  // Natekenen canvas
  const nWrap = document.getElementById('natekenen-canvas-wrap');
  const snapN = nCanvas.toDataURL();
  nCanvas.width = nWrap.clientWidth || 1;
  nCanvas.height = nWrap.clientHeight || 1;
  if (snapN !== 'data:,') { const i = new Image(); i.onload = () => nCtx.drawImage(i, 0, 0); i.src = snapN; }
}

window.addEventListener('resize', resizeCanvas);
setTimeout(resizeCanvas, 50);

function getPos(e, cvs) {
  const rect = cvs.getBoundingClientRect();
  const src = e.touches ? e.touches[0] : e;
  return { x: src.clientX - rect.left, y: src.clientY - rect.top };
}

function startTekenen(e) {
  e.preventDefault();
  tekening = true;
  laatste = getPos(e, actieveCanvas());
  const c = actieveCtx();
  c.beginPath();
  c.moveTo(laatste.x, laatste.y);
}

function teken(e) {
  e.preventDefault();
  if (!tekening) return;
  const pos = getPos(e, actieveCanvas());
  const c = actieveCtx();
  c.lineCap = 'round';
  c.lineJoin = 'round';

  if (tool === 'gum') {
    c.globalCompositeOperation = 'destination-out';
    c.lineWidth = penGrootte * 5;
    c.globalAlpha = 1;
    c.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    c.globalCompositeOperation = 'source-over';
    c.globalAlpha = 1;
    c.lineWidth = penGrootte;
    c.strokeStyle = penKleur;
  }

  c.lineTo(pos.x, pos.y);
  c.stroke();
  c.beginPath();
  c.moveTo(pos.x, pos.y);
  laatste = pos;
}

function stopTekenen() {
  if (!tekening) return;
  tekening = false;
  const c = actieveCtx();
  c.globalAlpha = 1;
  c.globalCompositeOperation = 'source-over';
}

function bindCanvas(cvs) {
  cvs.addEventListener('mousedown', startTekenen);
  cvs.addEventListener('mousemove', teken);
  cvs.addEventListener('mouseup', stopTekenen);
  cvs.addEventListener('mouseleave', stopTekenen);
  cvs.addEventListener('touchstart', startTekenen, { passive: false });
  cvs.addEventListener('touchmove', teken, { passive: false });
  cvs.addEventListener('touchend', stopTekenen);
}

bindCanvas(canvas);
bindCanvas(nCanvas);

// ── Tools ───────────────────────────────────────────────────
function setTool(t) {
  tool = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(t + '-btn')?.classList.add('active');
}

function setSize(g, id) {
  penGrootte = g;
  document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
}

function setKleur(k, el) {
  penKleur = k;
  document.querySelectorAll('.color-swatch').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  if (tool === 'gum') setTool('stift');
}

function wisActiefCanvas() {
  const c = actieveCtx();
  const cv = actieveCanvas();
  c.clearRect(0, 0, cv.width, cv.height);
}

function wisNatekeenCanvas() {
  nCtx.clearRect(0, 0, nCanvas.width, nCanvas.height);
}

// ── Modus ───────────────────────────────────────────────────
function setMode(mode, btn) {
  huidigeModus = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const banner = document.getElementById('opdracht-banner');
  const canvasWrap = document.getElementById('canvas-wrap');
  const natekeenWrap = document.getElementById('natekenen-wrap');
  const voorbeeldPanel = document.getElementById('voorbeeld-panel');
  const hintBtn = document.getElementById('hint-btn');

  banner.style.display = mode === 'opdracht' ? 'flex' : 'none';
  canvasWrap.style.display = mode === 'natekenen' ? 'none' : '';
  natekeenWrap.classList.toggle('actief', mode === 'natekenen');
  hintBtn.style.display = mode === 'opdracht' ? 'flex' : 'none';

  if (mode !== 'opdracht') {
    voorbeeldPanel.classList.remove('zichtbaar');
    voorbeeldZichtbaar = false;
  }

  if (mode === 'natekenen') {
    setTimeout(() => {
      resizeCanvas();
      toonNatekeen();
    }, 30);
  }
}

// ── Init ────────────────────────────────────────────────────
toonOpdracht();
